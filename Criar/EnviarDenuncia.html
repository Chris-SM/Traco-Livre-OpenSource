<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../modoEscuro.css">
    <link rel="stylesheet" href="Criar.css">
    <title>Enviar denúncia</title>
</head>
<body>
    <div class="container">
        <button id="btnVolta" class="voltar">
                <i class="bi bi-chevron-left"></i>
        </button>
        <div class="texto">
            <h1>Denúncia</h1>
            <p>Preencha os campos a seguir para efetuar uma denúncia.</p>
        </div>
        <hr>
        <div class="form">
            <div class="grupo-input">
                <label>Motivo</label>
                <span class="motivo">Motivo da denúncia</span>
            </div>
            <div class="grupo-input">
                <label>Descrição</label>
                <textarea  name="descricao" rows="4" cols="50" placeholder="Digite aqui..." required></textarea>
            </div>
            <div class="texto-color">
                <h4>Fotos do Ocorrido</h4>
                <p>Aqui é possível anexar fotos comprovando o que ocorreu.</p>
            </div>
            <div class="grupo-input">
                <button class="btn-adicionar"><img src="../icons/mais.png" alt="Adicionar Imagem"></button>
            </div>
                <button  class="btn btn-cancelar" id="btnVolta">Cancelar</button>
                <button  class="btn btn-avancar" onclick="window.location.href='ConfirmacaoDenuncia.html'">Enviar</button>
        </div>
    </div>
    <script src="../configuracao/modo.js"></script>
    <script>
        // Adiciona um ouvinte de evento ao botão
        document.getElementById("btnVolta").addEventListener("click", function() {
            // Chama a função history.back() para voltar à página anterior
            history.back();
        });
    </script>
</body>
</html>
