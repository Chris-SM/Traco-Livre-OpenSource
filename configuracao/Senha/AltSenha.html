<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../modoEscuro.css">
    <link rel="stylesheet" href="../../auth/style.css">
    <title>Alterar Senha</title>
    <script src="../../auth/VerSenha.js"></script>
</head>
<body>
    <div class="container">
        <div class="voltar">
            <a href="../Configuracoes.php">
                <i class="bi bi-chevron-left"></i>
            </a> 
        </div>
        <div class="texto">
            <h1>Alterar Senha</h1>
            <p>Para alterar sua senha preencha o campo abaixo cumprindo todas parametros.</p>
        </div>
        <div class="form">
            <div class="grupo-input">
                <label>Senha Atual</label>
                <div class="input-icone">
                    <input type="password" required placeholder="Insira..." id="senha">
                    <span><i class="bi bi-eye" id="mostrar" onclick="versenha()"></i></span>
                </div>
            </div>
            <div class="grupo-input">
                <label>Senha Nova</label>
                <div class="input-icone">
                    <input type="password" required placeholder="Insira..." id="nsenha">
                    <span><i class="bi bi-eye" id="nmostrar" onclick="vernsenha()"></i></span>
                </div>
            </div>
            <div class="grupo-input">
                <label>Confirmar Senha Nova</label>
                <div class="input-icone">
                    <input type="password" required placeholder="Insira..." id="csenha">
                    <span><i class="bi bi-eye" id="cmostrar" onclick="vercsenha()"></i></span>
                </div>
            </div>
        </div>
        <button class="btn" onclick="window.location.href='ConSenha.html'">Avançar</button>
    </div>
    <script src="../modo.js"></script>
</body>
</html>
