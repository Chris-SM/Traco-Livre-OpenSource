<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../eescuro.css">

    <title>Redefinir Senha</title>
    <script src="../VerSenha.js"></script>
</head>
<body>
    <div class="container">
        <div class="voltar">
            <a href="CodEmail.html">
                <i class="bi bi-chevron-left"></i>
            </a> 
        </div>
        <div class="texto">
            <h1>Redefinir Senha</h1>
            <p>Preencha os campos a seguir para redefinir sua senha.</p>
        </div>
        <div class="form">
            <div class="grupo-input">
                <label>Senha</label>
                <div class="input-icone">
                    <input type="password" required placeholder="Insira..." id="senha">
                    <span><i class="bi bi-eye" id="mostrar" onclick="versenha()"></i></span>
                </div>
            </div>
            <div class="grupo-input">
                <label>Confirmar Senha</label>
                <div class="input-icone">
                    <input type="password" required placeholder="Insira..." id="csenha">
                    <span><i class="bi bi-eye" id="cmostrar" onclick="vercsenha()"></i></span>
                </div>
            </div>
        </div>
        <button class="btn" onclick="window.location.href='ConSenha.html'">Avançar</button>
    </div>
    <script src="../../configuracao/modo.js"></script>
</body>
</html>
